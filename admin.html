<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gookie Admin Dashboard</title>

  <style>
  :root {
    --red: #bb191a;
    --cream: #fff6ed;
    --white: #ffffff;
    --brown: #4b3027;
    --muted: #7d6b63;
    --line: #eadcd0;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: Arial, sans-serif;
    background: var(--cream);
    color: var(--brown);
    padding: 28px;
  }

  h1 {
    font-family: Georgia, serif;
    font-size: 44px;
    color: var(--red);
    margin-bottom: 28px;
  }

  section {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 28px;
    padding: 24px;
    margin-bottom: 24px;
    box-shadow: 0 14px 34px rgba(75, 48, 39, 0.1);
  }

  h2 {
    margin-bottom: 18px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
  }

  .stat-card {
    background: var(--cream);
    border-radius: 22px;
    padding: 22px;
  }

  .stat-card p {
    color: var(--muted);
    font-weight: 700;
  }

  .stat-card strong {
    display: block;
    margin-top: 10px;
    font-size: 34px;
    color: var(--red);
  }

  #latestOrders {
    display: grid;
    gap: 12px;
  }

  .order-card {
    background: var(--cream);
    border-radius: 18px;
    padding: 16px;
    display: flex;
    justify-content: space-between;
    gap: 16px;
  }

  @media (max-width: 760px) {
    body {
      padding: 18px;
    }

    .stats-grid {
      grid-template-columns: 1fr;
    }

    h1 {
      font-size: 36px;
    }
  }
</style>
  
</head>

<body>
  <h1>🍪 Gookie Admin</h1>

  <section>
    <h2>Today</h2>

    <div class="stats-grid">
  <div class="stat-card">
    <p>Total Sales</p>
    <strong id="todaySales">RM0</strong>
  </div>

  <div class="stat-card">
    <p>Orders</p>
    <strong id="todayOrders">0</strong>
  </div>

  <div class="stat-card">
    <p>Cookies Sold</p>
    <strong id="cookiesSold">0</strong>
  </div>
</div>
  </section>

<div class="stat-card">
  <p>Average Order</p>
  <strong id="averageOrder">RM0</strong>
</div>

<div class="stat-card">
  <p>Pickup / Delivery</p>
  <strong id="methodCount">0 / 0</strong>
</div>
  
  <section>
    <h2>Latest Orders</h2>
    <div id="latestOrders">
      Loading orders...
    </div>
  </section>

  <script>
  const SHEET_URL = "https://script.google.com/macros/s/AKfycbxix-lKdXmQpFcSz4-H1EQoKzqx6MA6589jcVrH7A0KaEN7ErY9dfLZCL68R1Qt0MG-/exec";

  async function loadDashboard() {
    const response = await fetch(SHEET_URL);
    const orders = await response.json();

    const today = new Date().toDateString();

    const todayOrders = orders.filter(order => {
      return new Date(order.timestamp).toDateString() === today;
    });

    const totalSales = todayOrders.reduce((sum, order) => {
      return sum + Number(order.total || 0);
    }, 0);

const averageOrder = todayOrders.length
  ? totalSales / todayOrders.length
  : 0;

const pickupCount = todayOrders.filter(order => order.method === "pickup").length;
const deliveryCount = todayOrders.filter(order => order.method === "delivery").length;
    
    const cookiesSold = todayOrders.reduce((sum, order) => {
      const items = String(order.items || "").split(",");
      let count = 0;

      items.forEach(item => {
        const match = item.match(/x\s*(\d+)/i);
        if (match) count += Number(match[1]);
      });

      return sum + count;
    }, 0);

    document.getElementById("todaySales").textContent = `RM${totalSales.toFixed(2)}`;
    document.getElementById("todayOrders").textContent = todayOrders.length;
    document.getElementById("cookiesSold").textContent = cookiesSold;
    document.getElementById("averageOrder").textContent = `RM${averageOrder.toFixed(2)}`;
    document.getElementById("methodCount").textContent = `${pickupCount} / ${deliveryCount}`;
    const latestOrders = orders.slice(-5).reverse();

    document.getElementById("latestOrders").innerHTML = latestOrders.map(order => {
      return `
        <div class="order-card">
          <div>
            <strong>${order.orderID}</strong>
            <p>${order.name} • ${order.method}</p>
          </div>
          <strong>RM${Number(order.total || 0).toFixed(2)}</strong>
        </div>
      `;
    }).join("");
  }

  loadDashboard();
</script>
  
</body>
</html>
