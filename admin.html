<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Gookie Admin Dashboard</title>

  <style>
    :root {
      --red: #bb191a;
      --cream: #fff6ed;
      --white: #ffffff;
      --brown: #4b3027;
      --muted: #7d6b63;
      --line: #eadcd0;
      --soft: #fff0e3;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--cream);
      color: var(--brown);
      padding: 28px;
    }

    .admin-wrap {
      max-width: 1400px;
      margin: 0 auto;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 26px;
    }

    h1 {
      font-family: Georgia, serif;
      font-size: 46px;
      color: var(--red);
    }

    .refresh-btn {
      background: var(--red);
      color: white;
      border: none;
      border-radius: 999px;
      padding: 14px 24px;
      font-weight: 900;
      cursor: pointer;
    }

    .section {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 14px 34px rgba(75, 48, 39, 0.1);
    }

    .section h2 {
      margin-bottom: 18px;
      font-size: 24px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
    }

    .stat-card {
      background: var(--soft);
      border-radius: 22px;
      padding: 22px;
      min-height: 120px;
    }

    .stat-card p {
      color: var(--muted);
      font-weight: 800;
      margin-bottom: 10px;
    }

    .stat-card strong {
      display: block;
      font-size: 30px;
      color: var(--red);
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 24px;
    }

    .mini-list {
      display: grid;
      gap: 12px;
    }

    .mini-row,
    .order-card {
      background: var(--soft);
      border-radius: 18px;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
    }

    .mini-row strong,
    .order-card strong {
      color: var(--brown);
    }

    .muted {
      color: var(--muted);
      font-size: 14px;
      margin-top: 4px;
    }

    .order-status {
      color: var(--red);
      font-weight: 900;
      font-size: 13px;
      margin-top: 4px;
    }

    #latestOrders {
      display: grid;
      gap: 12px;
    }

    .order-price {
      color: var(--red);
      font-weight: 900;
      white-space: nowrap;
    }

    .empty {
      color: var(--muted);
      padding: 18px;
      background: var(--soft);
      border-radius: 18px;
    }

    @media (max-width: 980px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .dashboard-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 600px) {
      body {
        padding: 16px;
      }

      .admin-header {
        align-items: flex-start;
        flex-direction: column;
      }

      h1 {
        font-size: 36px;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .order-card {
        align-items: flex-start;
        flex-direction: column;
      }
    }

    .section-top {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  align-items: center;
  margin-bottom: 18px;
}

.search-input {
  width: min(360px, 100%);
  border: 1px solid var(--line);
  background: var(--soft);
  border-radius: 999px;
  padding: 14px 18px;
  color: var(--brown);
  outline: none;
}

@media (max-width: 600px) {
  .section-top {
    flex-direction: column;
    align-items: stretch;
  }
}

.section-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
}

.search-input {
  width: 320px;
  max-width: 100%;
  padding: 14px 18px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--soft);
  color: var(--brown);
  font-size: 15px;
  outline: none;
  transition: 0.2s;
}

.search-input:focus {
  border-color: var(--red);
  box-shadow: 0 0 0 4px rgba(187, 25, 26, 0.08);
}

@media (max-width: 700px) {
  .section-top {
    flex-direction: column;
    align-items: stretch;
  }

  .search-input {
    width: 100%;
  }
}

.filter-buttons {
  display: flex;
  gap: 8px;
}

.filter-btn {
  border: 1px solid var(--line);
  background: var(--soft);
  color: var(--brown);
  border-radius: 999px;
  padding: 12px 18px;
  font-weight: 800;
  cursor: pointer;
}

.filter-btn.active {
  background: var(--red);
  color: white;
  border-color: var(--red);
}

.open-order-btn {
  display: block;
  margin-top: 10px;
  background: var(--red);
  color: white;
  border: none;
  border-radius: 999px;
  padding: 9px 14px;
  font-weight: 900;
  cursor: pointer;
}
    
  </style>
</head>

<body>
  <div class="admin-wrap">

    <header class="admin-header">
      <div>
        <h1>🍪 Gookie Admin</h1>
        <p class="muted" id="lastUpdated">Loading dashboard...</p>
      </div>

      <button class="refresh-btn" onclick="loadDashboard()">
        Refresh
      </button>
    </header>

    <section class="section">
      <h2>Today</h2>

      <div class="stats-grid">
        <div class="stat-card">
          <p>Total Sales</p>
          <strong id="todaySales">RM0</strong>
        </div>

        <div class="stat-card">
          <p>Orders</p>
          <strong id="todayOrders">0</strong>
        </div>

        <div class="stat-card">
          <p>Cookies Sold</p>
          <strong id="cookiesSold">0</strong>
        </div>

        <div class="stat-card">
          <p>Average Order</p>
          <strong id="averageOrder">RM0</strong>
        </div>

        <div class="stat-card">
          <p>Pickup / Delivery</p>
          <strong id="methodCount">0 / 0</strong>
        </div>
      </div>
    </section>

    <div class="dashboard-grid">

      <section class="section">
        <h2>🔥 Top Selling Today</h2>
        <div class="mini-list" id="topSelling">
          <div class="empty">Loading best sellers...</div>
        </div>
      </section>

      <section class="section">
        <h2>🚚 Order Method</h2>
        <div class="mini-list" id="methodBreakdown">
          <div class="empty">Loading methods...</div>
        </div>
      </section>

    </div>

    <section class="section">
  <div class="section-top">
    <h2>Latest Orders</h2>

<div class="filter-buttons">
  <button class="filter-btn active" onclick="setOrderFilter('today', this)">
    Today
  </button>

  <button class="filter-btn" onclick="setOrderFilter('all', this)">
    All
  </button>
</div>
    
    <input
      type="text"
      id="orderSearch"
      class="search-input"
      placeholder="Search order ID, name, phone..."
      oninput="renderLatestOrders(window.gookieOrders)"
    />
  </div>
      <div id="latestOrders">
        <div class="empty">Loading orders...</div>
      </div>
    </section>

  </div>

  <script>
    const SHEET_URL = "https://script.google.com/macros/s/AKfycbxix-lKdXmQpFcSz4-H1EQoKzqx6MA6589jcVrH7A0KaEN7ErY9dfLZCL68R1Qt0MG-/exec";
let currentFilter = "today";
    function money(amount) {
      return `RM${Number(amount || 0).toFixed(2)}`;
    }

    function isToday(dateValue) {
      return new Date(dateValue).toDateString() === new Date().toDateString();
    }

    function parseItems(itemsText) {
      const result = [];

      String(itemsText || "")
        .split(",")
        .map(item => item.trim())
        .filter(Boolean)
        .forEach(item => {
          const match = item.match(/(.+)\s+x\s+(\d+)/i);

          if (match) {
            result.push({
              name: match[1].trim(),
              qty: Number(match[2])
            });
          }
        });

      return result;
    }

function setOrderFilter(filter, button) {

  currentFilter = filter;

  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.classList.remove("active");
  });

  button.classList.add("active");

  renderLatestOrders(window.gookieOrders);
  const filteredOrders =
  currentFilter === "today"
    ? window.gookieOrders.filter(order => isToday(order.timestamp))
    : window.gookieOrders;

renderTopSelling(filteredOrders);
const filteredSales = filteredOrders.reduce((sum, order) => {
  return sum + Number(order.total || 0);
}, 0);

const filteredAverage = filteredOrders.length
  ? filteredSales / filteredOrders.length
  : 0;

document.getElementById("averageOrder").textContent = money(filteredAverage);
}
    
    async function loadDashboard() {
      document.getElementById("lastUpdated").textContent = "Refreshing...";

      const response = await fetch(SHEET_URL);
      const orders = await response.json();
window.gookieOrders = orders;
      
      const todayOrders = orders.filter(order => isToday(order.timestamp));
      updateStats(todayOrders);
      renderTopSelling(todayOrders);
      renderMethodBreakdown(todayOrders);
      renderLatestOrders(orders);

      document.getElementById("lastUpdated").textContent =
        `Last updated: ${new Date().toLocaleString()}`;
    }

function updateStats(orders) {
  const totalSales = orders.reduce((sum, order) => {
    return sum + Number(order.total || 0);
  }, 0);

  const cookiesSold = orders.reduce((sum, order) => {
    return sum + parseItems(order.items)
      .reduce((itemSum, item) => itemSum + item.qty, 0);
  }, 0);

  const averageOrder = orders.length
    ? totalSales / orders.length
    : 0;

  const pickupCount =
    orders.filter(order => order.method === "pickup").length;

  const deliveryCount =
    orders.filter(order => order.method === "delivery").length;

  document.getElementById("todaySales").textContent = money(totalSales);
  document.getElementById("todayOrders").textContent = orders.length;
  document.getElementById("cookiesSold").textContent = cookiesSold;
  document.getElementById("averageOrder").textContent = money(averageOrder);
  document.getElementById("methodCount").textContent =
    `${pickupCount} / ${deliveryCount}`;
}
    
    function renderTopSelling(todayOrders) {
      const totals = {};

      todayOrders.forEach(order => {
        parseItems(order.items).forEach(item => {
          totals[item.name] = (totals[item.name] || 0) + item.qty;
        });
      });

      const sorted = Object.entries(totals)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 5);

      const container = document.getElementById("topSelling");

      if (sorted.length === 0) {
        container.innerHTML = `<div class="empty">No cookies sold today yet.</div>`;
        return;
      }

      container.innerHTML = sorted.map(([name, qty], index) => {
        const medal = ["🥇", "🥈", "🥉"][index] || "🍪";

        return `
          <div class="mini-row">
            <div>
              <strong>${medal} ${name}</strong>
              <p class="muted">${qty} sold</p>
            </div>
          </div>
        `;
      }).join("");
    }

    function renderMethodBreakdown(orders) {
  const pickup = orders.filter(order => order.method === "pickup").length;
  const delivery = orders.filter(order => order.method === "delivery").length;

  document.getElementById("methodBreakdown").innerHTML = `
    <div class="mini-row">
      <div>
        <strong>🏠 Pickup</strong>
        <p class="muted">Self collect orders</p>
      </div>
      <strong>${pickup}</strong>
    </div>

    <div class="mini-row">
      <div>
        <strong>🚚 Delivery</strong>
        <p class="muted">Delivery orders</p>
      </div>
      <strong>${delivery}</strong>
    </div>
  `;
}
function renderLatestOrders(orders) {
  const keyword =
    document.getElementById("orderSearch")?.value.toLowerCase().trim() || "";

  if (keyword) {
    orders = orders.filter(order => {
      return (
        String(order.orderID || "").toLowerCase().includes(keyword) ||
        String(order.name || "").toLowerCase().includes(keyword) ||
        String(order.phone || "").toLowerCase().includes(keyword)
      );
    });
  }

  if (currentFilter === "today") {
    orders = orders.filter(order => isToday(order.timestamp));
  }

  const latest = orders.slice(-8).reverse();
  const container = document.getElementById("latestOrders");

  if (latest.length === 0) {
    container.innerHTML = `<div class="empty">No orders yet.</div>`;
    return;
  }

  container.innerHTML = latest.map(order => {
    const items = parseItems(order.items);
    const cookieCount = items.reduce((sum, item) => sum + item.qty, 0);
    const methodIcon = order.method === "delivery" ? "🚚" : "🏠";

    return `
      <div class="order-card">
        <div>
          <p class="order-status">🟢 ${order.paymentStatus || "PAID"}</p>
          <strong>${order.orderID || "NO ID"}</strong>
          <p class="muted">👤 ${order.name || "-"} • ${methodIcon} ${order.method || "-"}</p>
          <p class="muted">🍪 ${cookieCount} cookies</p>
        </div>

       <div class="order-price">
  ${money(order.total)}
  <button class="open-order-btn">Open →</button>
</div>
      </div>
    `;
  }).join("");
}

    loadDashboard();
  </script>
</body>
</html>
