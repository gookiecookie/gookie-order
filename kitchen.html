<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Gookie Kitchen</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fff6ed;
      color: #4b3027;
      padding: 20px;
    }

    h1 {
      color: #bb191a;
      font-family: Georgia, serif;
    }

    .card {
      background: white;
      border-radius: 22px;
      padding: 20px;
      margin-bottom: 18px;
    }

    button {
      background: #bb191a;
      color: white;
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 800;
    }
  </style>
</head>

<body>
  <h1>🍪 Gookie Kitchen</h1>
  <p>Work mode for today’s tasks.</p>

  <div class="card">
    <h2>🚨 Verify Payment</h2>
    <p>Orders waiting for payment confirmation.</p>
    <button>Payment Confirmed</button>
  </div>

  <div class="card">
    <h2>🔥 Bake</h2>
    <p>Cookies that need to be baked today.</p>
    <button>Start Baking</button>
  </div>

  <div class="card">
    <h2>📦 Pack</h2>
    <p>Orders ready to pack.</p>
    <button>Packed</button>
  </div>

  <div class="card">
    <h2>🚚 Ship / Pickup</h2>
    <p>Orders ready to hand over.</p>
    <button>Completed</button>
  </div>

  <div class="card">
    <h2>📝 Staff Notes</h2>
    <textarea placeholder="Example: Eggs running low, boxes left 8..." style="width:100%; min-height:120px;"></textarea>
    <br><br>
    <button>Save Note</button>
  </div>
</body>
</html>
