<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Gookie Kitchen</title>

<style>
  :root {
    --red: #bb191a;
    --cream: #fff6ed;
    --white: #ffffff;
    --brown: #4b3027;
    --muted: #7d6b63;
    --line: #eadcd0;
    --soft: #fff0e3;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: Arial, sans-serif;
    background: var(--cream);
    color: var(--brown);
    padding: 20px;
  }

  .wrap {
    max-width: 980px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 24px;
  }

  h1 {
    color: var(--red);
    font-family: Georgia, serif;
    font-size: 42px;
  }

  .subtitle {
    color: var(--muted);
    margin-top: 8px;
  }

  .task-board {
  display: grid;
  gap: 18px;
}

.task-column {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: 24px;
  padding: 18px;
  box-shadow: 0 12px 28px rgba(75, 48, 39, 0.08);
}

.task-column h2 {
  font-size: 22px;
  margin-bottom: 14px;
}

.task-list {
  display: grid;
  gap: 12px;
}

.task-card {
  background: var(--soft);
  border-radius: 18px;
  padding: 14px;
}

.task-card strong {
  display: block;
  margin-bottom: 6px;
}

.task-card p {
  color: var(--muted);
  margin-bottom: 10px;
}

.empty {
  color: var(--muted);
  background: var(--soft);
  border-radius: 16px;
  padding: 14px;
}

.notes textarea {
  margin-bottom: 12px;
}

@media (min-width: 980px) {
  .task-board {
    grid-template-columns: repeat(3, 1fr);
  }

  .notes {
    grid-column: 1 / -1;
  }
}
  button {
    background: var(--red);
    color: white;
    border: none;
    border-radius: 999px;
    padding: 14px 20px;
    font-weight: 900;
    cursor: pointer;
  }

  textarea {
    width: 100%;
    min-height: 120px;
    border: 1px solid var(--line);
    background: var(--soft);
    border-radius: 18px;
    padding: 14px;
    font: inherit;
    color: var(--brown);
    outline: none;
  }

  @media (min-width: 760px) {
    .task-grid {
      grid-template-columns: repeat(2, 1fr);
    }

    .card.notes {
      grid-column: 1 / -1;
    }
  }
</style>
</head>

<body>
  <div class="wrap">
    <header>
      <h1>🍪 Gookie Kitchen</h1>
      <p class="subtitle">Work mode for today’s tasks. No sales, no noise — just what needs to be done.</p>
    </header>

   <main class="task-board">

  <section class="task-column">
    <h2>🚨 Verify Payment</h2>
    <div id="verifyList" class="task-list">
      <p class="empty">Loading...</p>
    </div>
  </section>

  <section class="task-column">
    <h2>🔥 Bake</h2>
    <div id="bakeList" class="task-list">
      <p class="empty">Loading...</p>
    </div>
  </section>

  <section class="task-column">
    <h2>❄️ Cooling</h2>
    <div id="coolingList" class="task-list">
      <p class="empty">Loading...</p>
    </div>
  </section>

  <section class="task-column">
    <h2>📦 Pack</h2>
    <div id="packList" class="task-list">
      <p class="empty">Loading...</p>
    </div>
  </section>

  <section class="task-column">
    <h2>🚚 Ship / Pickup</h2>
    <div id="shipList" class="task-list">
      <p class="empty">Loading...</p>
    </div>
  </section>

  <section class="task-column notes">
    <h2>📝 Staff Notes</h2>
    <textarea placeholder="Example: Eggs running low, boxes left 8..."></textarea>
    <button>Save Note</button>
  </section>

</main>
  </div>

  <script>
let kitchenOrders = [];
    
  const SHEET_URL = "https://script.google.com/macros/s/AKfycbxix-lKdXmQpFcSz4-H1EQoKzqx6MA6589jcVrH7A0KaEN7ErY9dfLZCL68R1Qt0MG-/exec";

async function loadKitchen() {
  const response = await fetch(SHEET_URL);
  const orders = await response.json();
  kitchenOrders = orders;

  console.log("Kitchen orders:", orders);

  renderKitchenBoard(orders);
}
    
function getWorkflowCount(orders, workflow) {
  return orders.filter(order => order.workflow === workflow).length;
}

function renderKitchenBoard(orders) {
  renderTaskList("verifyList", orders, "NEW", "Verify", "READY_TO_BAKE");
  renderTaskList("bakeList", orders, "READY_TO_BAKE", "Start Baking", "BAKING");
  renderTaskList("coolingList", orders, "COOLING", "Ready to Pack", "READY_TO_PACK");
  renderTaskList("packList", orders, "READY_TO_PACK", "Packed", "READY_TO_SHIP");
  renderTaskList("shipList", orders, "READY_TO_SHIP", "Completed", "COMPLETED");
}

function renderTaskList(containerId, orders, workflow, buttonText, nextWorkflow) {
  const container = document.getElementById(containerId);
  const list = orders.filter(order => order.workflow === workflow);

  if (list.length === 0) {
    container.innerHTML = `<p class="empty">No tasks here.</p>`;
    return;
  }

  container.innerHTML = list.map(order => `
  <div class="task-card compact-card">
    <div>
      <strong>${order.orderID || "NO ID"}</strong>
      <p>${order.name || "-"} • ${money(order.total)}</p>
    </div>

    <button onclick="openTaskModal('${order.orderID}', '${buttonText}', '${nextWorkflow}')">
      Open
    </button>
  </div>
`).join("");
}

function moveOrder(orderID, nextWorkflow) {
  const order = kitchenOrders.find(order => order.orderID === orderID);

  if (!order) {
    alert("Order not found.");
    return;
  }

  let paymentStatus = order.paymentStatus || "PENDING";

  if (nextWorkflow === "READY_TO_BAKE") {
    paymentStatus = "VERIFIED";
  }

  fetch(SHEET_URL, {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "text/plain"
    },
    body: JSON.stringify({
      action: "updateStatus",
      orderID: orderID,
      paymentStatus: paymentStatus,
      workflow: nextWorkflow
    })
  });

  alert(`${orderID} moved to ${nextWorkflow}.`);

  setTimeout(loadKitchen, 1000);
}
    
function verifyFirstOrder() {
  const order = kitchenOrders.find(order => order.workflow === "NEW");

  if (!order) {
    alert("No orders waiting for payment verification.");
    return;
  }

  fetch(SHEET_URL, {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "text/plain"
    },
    body: JSON.stringify({
      action: "updateStatus",
      orderID: order.orderID,
      paymentStatus: "VERIFIED",
      workflow: "READY_TO_BAKE"
    })
  });

  alert(`${order.orderID} marked as payment verified.`);

  setTimeout(loadKitchen, 1000);
}
    
  loadKitchen();
</script>
  
</body>
</html>
