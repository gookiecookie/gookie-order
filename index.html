<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gookie Order POS</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <h1>Gookie’s Cookies</h1>
  <p>Fresh baked soft chunky cookies</p>
</header>

<div class="layout">

  <!-- MENU -->
  <div class="menu">

    <h2>Menu</h2>

    <div class="card">
      <img src="images/choco.jpg">
      <div>
        <h3>Double Chocolate</h3>
        <p>RM 8.00</p>
        <button onclick="changeQty('choco',1)">Add</button>
      </div>
    </div>

    <div class="card">
      <img src="images/smores.jpg">
      <div>
        <h3>S’mores Gookie</h3>
        <p>RM 9.00</p>
        <button onclick="changeQty('smores',1)">Add</button>
      </div>
    </div>

    <div class="card">
      <img src="images/tiramisu.jpg">
      <div>
        <h3>Tiramisu Lava</h3>
        <p>RM 10.00</p>
        <button onclick="changeQty('tiramisu',1)">Add</button>
      </div>
    </div>

  </div>

  <!-- CART -->
  <div class="cart">

    <h2>Customer Details</h2>

    <input id="name" placeholder="Full Name">
    <input id="phone" placeholder="Phone Number">
    <textarea id="address" placeholder="Address (optional)"></textarea>
    <textarea id="note" placeholder="Order notes (less sweet, etc)"></textarea>

    <hr>

    <h2>Your Order</h2>
    <div id="cart"></div>

    <h3>Total: RM <span id="total">0</span></h3>

    <button onclick="checkout()" class="checkout">
      Send WhatsApp Order
    </button>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
