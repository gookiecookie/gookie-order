<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gookie POS Order</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <h1>Gookie’s Cookies</h1>
  <p>Soft chunky cookies, baked fresh daily</p>
</header>

<div class="layout">

  <!-- MENU -->
  <div class="menu">

    <h2>Signature Cookies</h2>

    <div class="card">
      <img src="images/choco.jpg">
      <div class="info">
        <h3>Double Chocolate</h3>
        <p>RM 8.00</p>

        <div class="controls">
          <button onclick="changeQty('choco', -1)">-</button>
          <span id="qty-choco">0</span>
          <button onclick="changeQty('choco', 1)">+</button>
        </div>
      </div>
    </div>

    <div class="card">
      <img src="images/smores.jpg">
      <div class="info">
        <h3>S’mores Gookie</h3>
        <p>RM 9.00</p>

        <div class="controls">
          <button onclick="changeQty('smores', -1)">-</button>
          <span id="qty-smores">0</span>
          <button onclick="changeQty('smores', 1)">+</button>
        </div>
      </div>
    </div>

    <div class="card">
      <img src="images/tiramisu.jpg">
      <div class="info">
        <h3>Tiramisu Lava</h3>
        <p>RM 10.00</p>

        <div class="controls">
          <button onclick="changeQty('tiramisu', -1)">-</button>
          <span id="qty-tiramisu">0</span>
          <button onclick="changeQty('tiramisu', 1)">+</button>
        </div>
      </div>
    </div>

  </div>

  <!-- CART -->
  <div class="cart">

    <h2>Your Order</h2>

    <div id="cartItems"></div>

    <h3>Total: RM <span id="total">0</span></h3>

    <button class="checkout" onclick="checkout()">
      Checkout WhatsApp
    </button>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
