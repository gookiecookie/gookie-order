<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gookie's Cookies | Order</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- ================= HEADER ================= -->

<header class="header">

<div class="logo">

<img src="assets/images/logo.png" alt="Gookie Logo">

</div>

</header>

<!-- ================= HERO ================= -->

<section class="hero">

<h1>

Freshly Baked<br>

<span>Chunky Cookies</span>

</h1>

<p>

Crafted with premium ingredients and baked to perfection.

</p>

<a href="#products" class="hero-btn">

Start Ordering

</a>

</section>

<!-- ================= PRODUCTS ================= -->

<section id="products" class="products">

<h2>

10 Signature Cookies

</h2>

<div class="product-grid">

<!-- Card 1 -->

<div class="card">

<img src="assets/images/classic choc chip.png">

<h3>The OG</h3>

<p>The one that started it all.</p>

<h4>RM8</h4>

<div class="qty">

<button>-</button>

<span>0</span>

<button>+</button>

</div>

</div>

<!-- Card 2 -->

<div class="card">

<img src="assets/images/dark seasalt.png">

<h3>Dark Seasalt</h3>

<p>Rich dark cocoa with sea salt flakes.</p>

<h4>RM8</h4>

<div class="qty">

<button>-</button>

<span>0</span>

<button>+</button>

</div>

</div>

</div>

</section>

<!-- ================= CART ================= -->

<div class="floating-cart">

🛒

<span>0 Items</span>

<strong>RM0.00</strong>

</div>

<script src="script.js"></script>

</body>

</html>
