<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spudlicious POS System</title>
    <script src="[cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <style>
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-yellow-500 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-2xl font-bold italic">SPUDLICIOUS AMPANG</h1>
        <div id="clock" class="font-mono"></div>
    </header>

    <main class="flex flex-1 overflow-hidden">
        <!-- Left: Product Selection -->
        <section class="flex-1 p-6 overflow-y-auto">
            <div class="mb-6 flex gap-4">
                <button onclick="filterCategory('All')" class="bg-white px-4 py-2 rounded-full shadow hover:bg-yellow-100 transition">All Items</button>
                <button onclick="filterCategory('Potato')" class="bg-white px-4 py-2 rounded-full shadow hover:bg-yellow-100 transition">Potatoes</button>
                <button onclick="filterCategory('Sides')" class="bg-white px-4 py-2 rounded-full shadow hover:bg-yellow-100 transition">Sides</button>
                <button onclick="filterCategory('Drinks')" class="bg-white px-4 py-2 rounded-full shadow hover:bg-yellow-100 transition">Drinks</button>
            </div>

            <div id="productContainer" class="product-grid">
                <!-- Products will be injected here by JS -->
            </div>
        </section>

        <!-- Right: Order Sidebar -->
        <aside class="w-96 bg-white shadow-xl flex flex-col">
            <div class="p-4 border-b bg-gray-50">
                <h2 class="text-xl font-bold text-gray-700">Current Order</h2>
            </div>
            
            <div id="cartItems" class="flex-1 overflow-y-auto p-4 space-y-4">
                <!-- Cart items injected here -->
                <p class="text-gray-400 text-center mt-10">No items selected</p>
            </div>

            <div class="p-4 border-t border-gray-200 bg-gray-50">
                <div class="flex justify-between text-lg mb-2">
                    <span>Subtotal</span>
                    <span id="subtotal">RM 0.00</span>
                </div>
                <div class="flex justify-between text-2xl font-bold text-yellow-600 mb-4">
                    <span>Total</span>
                    <span id="total">RM 0.00</span>
                </div>
                <button onclick="checkout()" class="w-full bg-green-500 text-white py-4 rounded-xl font-bold text-xl hover:bg-green-600 transition shadow-lg">
                    PLACE ORDER
                </button>
            </div>
        </aside>
    </main>

    <script>
        const products = [
            { id: 1, name: 'Loaded Potato', price: 12.50, category: 'Potato', image: '[via.placeholder.com](https://via.placeholder.com/150?text=Potato)' },
            { id: 2, name: 'Cheesy Wedges', price: 8.00, category: 'Sides', image: '[via.placeholder.com](https://via.placeholder.com/150?text=Wedges)' },
            { id: 3, name: 'Iced Lemon Tea', price: 4.50, category: 'Drinks', image: '[via.placeholder.com](https://via.placeholder.com/150?text=Tea)' },
            { id: 4, name: 'Bolognese Potato', price: 14.00, category: 'Potato', image: '[via.placeholder.com](https://via.placeholder.com/150?text=Bolognese)' },
            { id: 5, name: 'Crispy Nuggets', price: 7.50, category: 'Sides', image: '[via.placeholder.com](https://via.placeholder.com/150?text=Nuggets)' },
            { id: 6, name: 'Mineral Water', price: 2.00, category: 'Drinks', image: '[via.placeholder.com](https://via.placeholder.com/150?text=Water)' },
        ];

        let cart = [];

        function renderProducts(filter = 'All') {
            const container = document.getElementById('productContainer');
            container.innerHTML = '';
            
            products.forEach(p => {
                if (filter === 'All' || p.category === filter) {
                    const el = document.createElement('div');
                    el.className = 'bg-white p-3 rounded-xl shadow cursor-pointer hover:scale-105 transition transform border-2 border-transparent hover:border-yellow-400';
                    el.onclick = () => addToCart(p.id);
                    el.innerHTML = `
                        <img src="${p.image}" class="w-full h-32 object-cover rounded-lg mb-2">
                        <h3 class="font-bold text-gray-800">${p.name}</h3>
                        <p class="text-yellow-600 font-semibold">RM ${p.price.toFixed(2)}</p>
                    `;
                    container.appendChild(el);
                }
            });
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const exists = cart.find(item => item.id === id);

            if (exists) {
                exists.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            updateCart();
        }

        function updateCart() {
            const container = document.getElementById('cartItems');
            const subtotalEl = document.getElementById('subtotal');
            const totalEl = document.getElementById('total');
            
            if (cart.length === 0) {
                container.innerHTML = '<p class="text-gray-400 text-center mt-10">No items selected</p>';
                subtotalEl.innerText = 'RM 0.00';
                totalEl.innerText = 'RM 0.00';
                return;
            }

            container.innerHTML = '';
            let subtotal = 0;

            cart.forEach(item => {
                subtotal += item.price * item.quantity;
                const el = document.createElement('div');
                el.className = 'flex justify-between items-center bg-gray-50 p-3 rounded-lg';
                el.innerHTML = `
                    <div>
                        <h4 class="font-bold text-gray-700">${item.name}</h4>
                        <p class="text-sm text-gray-500">RM ${item.price.toFixed(2)} x ${item.quantity}</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="changeQty(${item.id}, -1)" class="bg-gray-200 px-2 rounded">-</button>
                        <span class="font-mono">${item.quantity}</span>
                        <button onclick="changeQty(${item.id}, 1)" class="bg-gray-200 px-2 rounded">+</button>
                    </div>
                `;
                container.appendChild(el);
            });

            subtotalEl.innerText = `RM ${subtotal.toFixed(2)}`;
            totalEl.innerText = `RM ${subtotal.toFixed(2)}`;
        }

        function changeQty(id, delta) {
            const item = cart.find(i => i.id === id);
            item.quantity += delta;
            if (item.quantity <= 0) {
                cart = cart.filter(i => i.id !== id);
            }
            updateCart();
        }

        function filterCategory(cat) {
            renderProducts(cat);
        }

        function checkout() {
            if (cart.length === 0) return alert("Cart is empty!");
            alert("Order Placed Successfully!");
            cart = [];
            updateCart();
        }

        // Live Clock
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleString();
        }, 1000);

        renderProducts();
    </script>
</body>
</html>
