<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gookie Order Page</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1 class="title">Order Gookie’s Cookies</h1>

<!-- CUSTOMER FORM -->
<div class="form">
  <input type="text" id="name" placeholder="Your Name" required>
  <input type="text" id="phone" placeholder="Phone Number" required>
  <textarea id="note" placeholder="Notes (optional)"></textarea>
</div>

<!-- MENU -->
<h2>Menu</h2>

<div class="menu">

  <div class="item">
    <p>Chocolate Chunk</p>
    <button onclick="addItem('Chocolate Chunk')">Add</button>
  </div>

  <div class="item">
    <p>Strawberry White Choc</p>
    <button onclick="addItem('Strawberry White Choc')">Add</button>
  </div>

  <div class="item">
    <p>Salted Caramel</p>
    <button onclick="addItem('Salted Caramel')">Add</button>
  </div>

  <div class="item">
    <p>Lava Cookie</p>
    <button onclick="addItem('Lava Cookie')">Add</button>
  </div>

</div>

<!-- CART -->
<h2>Your Order</h2>
<ul id="cart"></ul>

<button class="btn" onclick="sendWhatsApp()">Checkout via WhatsApp</button>

<script src="script.js"></script>
</body>
</html>
